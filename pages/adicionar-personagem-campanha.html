<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Personagem à Campanha - Gênesis RPG</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/galaxy.css">
    <link rel="stylesheet" href="../css/glassmorphism.css">
</head>

<body>
    <!-- Fundo Nebulosa -->
    <canvas id="nebula-canvas"></canvas>

    <!-- Conteúdo acima da galáxia -->
    <div id="foreground">
        <!-- Navbar -->
        <nav class="navbar">
            <a href="../index.html" class="logo">Gênesis RPG</a>

            <ul class="nav-list">
                <li><a href="fichas.html" class="nav-link">Fichas</a></li>
                <li><a href="campanhas.html" class="nav-link">Campanhas</a></li>
                <li><a href="Sistema.html" class="nav-link">Sistema</a></li>

                <button id="logoutBtn" class="nav-btn">Sair</button>
                </li>
            </ul>
        </nav>

        <div id="webgl-fallback">
            <p>WebGL não está disponível. A visualizar versão simplificada.</p>
        </div>

        <!-- Main Content -->
        <div class="container py-5">
            <div class="row mb-4">
                <div class="col">
                    <h1>🎮 Adicionar Personagem à Campanha</h1>
                </div>
                <div class="col text-end">
                    <button class="btn btn-secondary" onclick="window.history.back()">← Voltar</button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="text-center py-5">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
            </div>

            <!-- Content -->
            <div id="content" style="display: none;">
                <!-- Informações da Campanha -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">🎭 Campanha</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Nome:</strong> <span id="campanhaName">-</span></p>
                        <p><strong>Descrição:</strong> <span id="campanhaDesc">-</span></p>
                    </div>
                </div>

                <!-- Seleção de Personagem -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">🎮 Selecione um Personagem</h5>
                    </div>
                    <div class="card-body">
                        <!-- Loading State -->
                        <div id="loadingPersonagens" class="text-center py-3">
                            <div class="spinner-border spinner-border-sm" role="status">
                                <span class="visually-hidden">Carregando...</span>
                            </div>
                        </div>

                        <!-- Empty State -->
                        <div id="emptyPersonagens" style="display: none;" class="alert alert-info">
                            <p class="mb-0">Você não tem personagens criados. <a href="criar-ficha.html">Crie um novo
                                    personagem</a></p>
                        </div>

                        <!-- Personagens List -->
                        <div id="personagensContainer"></div>

                        <!-- Botão de Adicionar -->
                        <div id="botaoContainer" style="display: none;" class="mt-4">
                            <button class="btn btn-primary btn-lg w-100" onclick="adicionarPersonagem()">
                                ✅ Adicionar Personagem à Campanha
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/galaxy.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/personagens.js"></script>
    <script src="../js/campanhas.js"></script>
    <script src="../js/adicionar-personagem-campanha.js"></script>
</body>

</html>
