<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Campanha - Projeto Gênesis</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/galaxy.css">
    <link rel="stylesheet" href="../css/glassmorphism.css">
</head>

<body>

    <canvas id="nebula-canvas"></canvas>

    <div id="foreground">
        <!-- Navbar -->
        <nav class="navbar">
            <a href="../index.html" class="logo">
                <img src="../assets/GenisisLogov6.png" alt="Logo" class="logo-img">
                <span>Projeto Gênesis</span>
            </a>

            <ul class="nav-list">
                <li><a href="fichas.html" class="nav-link">Fichas</a></li>
                <li><a href="campanhas.html" class="nav-link">Campanhas</a></li>
                <li><a href="Sistema.html" class="nav-link">Sistema</a></li>

                <li id="loginItem" class="nav-action" style="display:none;">
                    <button id="loginBtn" class="nav-btn">Login</button>
                </li>
                <li id="userItem" class="nav-action" style="display:none;">
                    <div id="user-avatar-wrapper" class="avatar-wrapper">
                        <img id="profile-picture" src="" alt="Perfil" class="avatar-img">
                    </div>
                </li>
            </ul>
        </nav>

        <!-- Sidebar de Perfil -->
        <div id="user-sidebar" class="user-sidebar">
            <div class="sidebar-header">
                <img id="sidebar-pic" src="" alt="Foto de Perfil" class="sidebar-avatar">
                <div class="username-container">
                    <h3 id="sidebar-name">Nome do Utilizador</h3>
                    <button id="edit-username-btn" class="edit-username-btn">✏️</button>
                    <input id="sidebar-name-input" class="username-input" style="display: none;" maxlength="20">
                </div>
                <p id="sidebar-email">email@exemplo.com</p>
            </div>
            <div class="sidebar-content">
                <div class="profile-info">
                    <div class="info-item">
                        <span class="info-label">Nível da Conta</span>
                        <span id="sidebar-level" class="info-value">1</span>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <span>Bio</span>
                            <button id="edit-bio-btn" class="edit-username-btn">✏️</button>
                        </div>
                        <p id="sidebar-bio" class="info-bio">Nenhuma bio definida.</p>
                        <textarea id="sidebar-bio-input" class="bio-input" style="display: none;" maxlength="150"></textarea>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-btn logout-full">Sair</button>
            </div>
        </div>
        <!-- Main Content -->
        <div class="glass-wrapper">
            <div class="row mb-4">
                <div class="col">
                    <h1>🎭 Criar Campanha</h1>
                </div>
                <div class="col text-end">
                    <a href="campanhas.html" class="btn btn-secondary">← Voltar</a>
                </div>
            </div>

            <div class="row">

                <form id="campanhaForm">
                    <!-- Informações da Campanha -->
                    <div class="card mb-4" style="width: 50rem;">
                        <div class="card-header">
                            <h5 class="mb-0">🎭 Informações da Campanha</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome da Campanha *</label>
                                <input type="text" class="form-control" id="nome" name="nome" required>
                            </div>
                            <div class="mb-3">
                                <label for="descricao" class="form-label">Descrição</label>
                                <textarea class="form-control" id="descricao" name="descricao" rows="4"></textarea>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="ativa" name="ativa" checked>
                                    <label class="form-check-label" for="ativa">
                                        Campanha Ativa
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botões -->
                    <div class="row">
                        <div class="col">
                            <a href="campanhas.html" class="btn btn-secondary">← Cancelar</a>
                            <button type="submit" class="btn btn-primary">✅ Salvar Campanha</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/galaxy.js"></script>
    <script src="../js/auth.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/campanhas.js"></script>
    <script src="../js/criar-campanha.js"></script>
</body>

</html>
